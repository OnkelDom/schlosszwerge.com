name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deployment tools
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy static site via SFTP
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PASSWORD: ${{ secrets.HETZNER_PASSWORD }}
          HETZNER_TARGET_DIR: ${{ secrets.HETZNER_TARGET_DIR }}
        run: |
          test -n "$HETZNER_HOST"
          test -n "$HETZNER_PORT"
          test -n "$HETZNER_USER"
          test -n "$HETZNER_PASSWORD"
          test -n "$HETZNER_TARGET_DIR"

          build_dir="$RUNNER_TEMP/site"
          rm -rf "$build_dir"
          mkdir -p "$build_dir"

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            ./ "$build_dir"/

          lftp -u "$HETZNER_USER","$HETZNER_PASSWORD" -p "$HETZNER_PORT" sftp://"$HETZNER_HOST" <<EOF
          set sftp:auto-confirm yes
          mirror --reverse --delete --verbose "$build_dir"/ "$HETZNER_TARGET_DIR"/
          bye
          EOF
